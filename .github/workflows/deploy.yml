name: 🚀 Deploy React App to Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Node.js
      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: 📦 Install Dependencies
        run: npm ci

      # 4️⃣ Build the React app
      - name: 🏗️ Build Project
        run: npx vite build

      # 5️⃣ Prepare temporary deploy folder
      - name: 📁 Prepare temporary deploy folder
        run: |
          rm -rf .deploy_temp
          mkdir .deploy_temp
          cp -r dist/* .deploy_temp/

      # 6️⃣ Clean old files on Hostinger but preserve .htaccess
      - name: 🧹 Clean old files but preserve .htaccess
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/domains/candidates247.com/public_html
            # Move .htaccess temporarily
            if [ -f .htaccess ]; then mv .htaccess ../.htaccess_backup; fi
            # Delete everything else
            rm -rf ./*
            # Restore .htaccess
            if [ -f ../.htaccess_backup ]; then mv ../.htaccess_backup .htaccess; fi

      # 7️⃣ Deploy built files via SCP
      - name: 📤 Deploy built files via SCP
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: ".deploy_temp/*"   # only deploy folder contents
          target: "/home/${{ secrets.SSH_USER }}/domains/candidates247.com/public_html/"
          recursive: true