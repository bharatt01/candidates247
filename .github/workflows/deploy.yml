name: 🚀 Deploy React App to Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Node.js
      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: 📦 Install Dependencies
        run: npm ci

      # 4️⃣ Build the React app with Vite
      - name: 🏗️ Build Project
        run: npx vite build

      # 5️⃣ Prepare deploy folder (copy dist contents)
      - name: 📁 Prepare Deploy Folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp -r dist/* deploy/

      # 6️⃣ Clean old files on Hostinger
      - name: 🧹 Clean old files on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/domains/candidates247.com/public_html
            rm -rf ./*

      # 7️⃣ Deploy built files via SCP
      - name: 📤 Deploy via SCP
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/*"   # ⬅ deploy folder contents only
          target: "/home/${{ secrets.SSH_USER }}/domains/candidates247.com/public_html/"
          recursive: true