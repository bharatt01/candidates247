name: 🚀 Deploy React App to Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npx vite build

      - name: 📁 Prepare temporary deploy folder
        run: |
          rm -rf .deploy_temp
          mkdir .deploy_temp
          cp -r dist/* .deploy_temp/

      - name: 🧹 Clean old files on Hostinger
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/domains/candidates247.com/public_html
            rm -rf ./*

      - name: 📤 Deploy built files via SCP
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: ".deploy_temp/*"
          target: "/home/${{ secrets.SSH_USER }}/domains/candidates247.com/public_html/"
          recursive: true